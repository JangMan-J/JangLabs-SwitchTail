# SwitchTail hold config — included last from kitty.conf so it wins over earlier maps.
#
# Ctrl+Shift+R = "hold the line": flag the focused claude session to auto-resume
# on its next launch, then close the pane. This is the ONE deliberate way to end a
# session and have it come back; every other exit (/exit, Ctrl+Shift+Q close_window,
# window close, crash) starts fresh next time. Rebind the key here if you like.
#
# The close is OWNED BY THE KITTEN, not chained here: hold.py writes the hold
# marker and only then closes the pane it acted on, and only for a tagged board claude
# line. A bare `combine : ... : close_window` would drain the close unconditionally and
# shut a manually-split/untagged pane with no resume armed — so it is deliberately gone.
map ctrl+shift+r kitten hold.py
