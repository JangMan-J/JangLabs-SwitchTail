# SwitchTail Keys — the numpad switchboard for juggling Claude agents.
# Included LAST from kitty.conf, so these win over any earlier maps.
#
# IMPORTANT: kitty.conf has NO inline comments — a '#' after a value becomes part
# of the value. Every comment here is on its own line. Do not append '# ...' to a map.
#
# MENTAL MODEL: your agents are tiles in one board window. The numpad picks
# WHO you're looking at and WHERE they sit. Two views, flipped with Ctrl+numpad-Enter:
#   BOARD (tall)  = all agents tiled: one big "hot seat" (left) + a stack (right).
#   SOLO  (stack) = one agent fills the window; the WHO keys swap who is shown.
#
# BOX FACTS: NumLock stays ON.
#   bare numpad    = digits, typed straight into the terminal (left untouched).
#   Ctrl  + numpad = WHO / aux layer  (digit keysyms kp_0..kp_9, kp_enter, kp_subtract).
#   Shift + numpad = WHERE layer. Shift cancels NumLock on this box, so the pad emits
#                    nav keysyms (kp_up/down/left/right, kp_begin=5, kp_home=7, kp_page_up=9).

# ===== WHO — focus/show agent N (1 = master/hot seat; stable, alphabetical by lab) =====
map ctrl+kp_1 nth_window 0
map ctrl+kp_2 nth_window 1
map ctrl+kp_3 nth_window 2
map ctrl+kp_4 nth_window 3
map ctrl+kp_5 nth_window 4
map ctrl+kp_6 nth_window 5
map ctrl+kp_7 nth_window 6
map ctrl+kp_8 nth_window 7
map ctrl+kp_9 nth_window 8

# ===== FOCUS dpad — move the cursor between agents (Shift + numpad 8/2/4/6) =====
map shift+kp_up      neighboring_window up
map shift+kp_down    neighboring_window down
map shift+kp_left    neighboring_window left
map shift+kp_right   neighboring_window right

# ===== MOVE dpad — shove the focused agent around the tiling (Shift+Alt + numpad 8/2/4/6) =====
map shift+alt+kp_up      move_window up
map shift+alt+kp_down    move_window down
map shift+alt+kp_left    move_window left
map shift+alt+kp_right   move_window right

# ===== SHUFFLE (Shift + numpad 7/9); Shift+5 freed =====
# Shift+5 = freed — promote now lives on the swap (Ctrl+Shift+Enter, see AUX)
# map shift+kp_begin   move_window_to_top
# Shift+7 / Shift+9 = shuffle the focused agent one slot back / forward
map shift+kp_home    move_window_backward
map shift+kp_page_up move_window_forward

# ===== AUX — the rim =====
# Ctrl+Enter = flip BOARD <-> SOLO (the master switch)
map ctrl+kp_enter    toggle_layout stack
# Ctrl+0 = jump back to the last agent you were on
map ctrl+kp_0        nth_window -1
# Ctrl+minus = reset to the clean BOARD layout
map ctrl+kp_subtract goto_layout tall
# Ctrl+Shift+Enter = swap: yank the focused agent into the hot seat (master);
# press again to fling it back where it came from (swap.py kitten).
map ctrl+shift+kp_enter kitten swap.py

# ===== TABS — a board holds up to 5 agents per tab; overflow spills to more tabs =====
# `stail patch` packs 5 panes/tab, so a large cart becomes several tabs. The WHO keys
# (nth_window) and the FOCUS/MOVE dpads act WITHIN the active tab; these flip between tabs.
# Ctrl+/ = previous tab, Ctrl+* = next tab.
map ctrl+kp_divide   previous_tab
map ctrl+kp_multiply next_tab

# ===== open slots — uncomment / reassign whenever you like =====
# (Ctrl+/ and Ctrl+* are now tab prev/next, above.)
# swap_with_window = visual swap (kitty paints hints; pick one to exchange)
# goto_layout grid = grid view (handy for 6+ agents in one tab)
